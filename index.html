<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="introduction">
    <div class="background">
        <header class="container header">
            <img src="img/logo.svg" alt="Logo Pokémon" class="header-logo">

            <nav class="header-nav">
                <ul>
                    <li class="header-item"><a href="/">Treinador</a></li>
                </ul>
            </nav>
        </header>

        <div class="introduction-text container">
            <span>pokedex</span>
            <h1>Who is that Pokémon?</h1>
            <p>The perfect guide for those who want to hunt Pokémons around the world</p>
        </div>
        <div class="introduction-img">
            <img src="img/luzes.svg" alt="imagem com três estrelas">
            <img src="img/img-pokeball.png" alt="imagem de uma pokebola vermelha">
        </div>
    </div>
    <div class="background-select">
        <div class="container select">
            <h2>Select your Pokémon</h2>
            <div class="select-search">
                <input type="text" placeholder="Search name or code">
                <button>P</button>
            </div>
        </div>
    </div>
    </section>
</body>
</html>
