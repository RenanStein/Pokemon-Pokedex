<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="introduction">
    <div class="background">
        <header class="container header">
            <img src="img/logo.svg" alt="Logo Pokémon" class="header-logo">

            <nav class="header-nav">
                <ul>
                    <li class="header-item"><a href="/">Treinador</a></li>
                </ul>
            </nav>
        </header>

        <div class="introduction-text container">
            <span>pokedex</span>
            <h1>Who is that Pokémon?</h1>
            <p>The perfect guide for those who want to hunt Pokémons around the world</p>
        </div>
        <div class="introduction-img">
            <img src="img/light.svg" alt="imagem com três estrelas" class="introduction-light">
            <img src="img/pokebola.svg" alt="imagem de uma pokebola vermelha" class="introduction-pokebola" data-pokebola="pokebola">
            <img src="img/ultra-ball.svg" alt="imagem de uma pokebola vermelha" class="introduction-pokebola pokebola" data-pokebola="ultra-ball">
        </div>
    </div>
    <div class="background-select">
        <div class="container select">
            <div class="select-text">
            <h2>Select your Pokémon</h2>
            </div>
            <div class="select-search">
                <input type="text" placeholder="Search name or code">
                <button><img src="img/search.svg" alt=""></button>
            </div>
        </div>
    </div>
    </section>

    <main class="pokedex-background">
        <section class="pokedex container">
            <div class="pokedex-type">
                <ul class="pokedex-list">
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/icon-all.svg" alt="">
                            <span>All</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/normal.svg" alt="">
                            <span>Normal</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/fighting.svg" alt="">
                            <span>Fighting</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/flying.svg" alt="">
                            <span>Flying</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/poison.svg" alt="">
                            <span>Poison</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/ground.svg" alt="">
                            <span>Ground</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/rock.svg" alt="">
                            <span>Rock</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/bug.svg" alt="">
                            <span>Bug</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/ghost.svg" alt="">
                            <span>Ghost</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/steel.svg" alt="">
                            <span>Steel</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/fire.svg" alt="">
                            <span>Fire</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/water.svg" alt="">
                            <span>Water</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/grass.svg" alt="">
                            <span>Grass</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/electric.svg" alt="">
                            <span>Eletric</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/psychic.svg" alt="">
                            <span>Psychic</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/ice.svg" alt="">
                            <span>Ice</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/dragon.svg" alt="">
                            <span>Dragon</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/dark.svg" alt="">
                            <span>Dark</span>
                        </button>
                    </li>
                    <li class="pokedex-item">
                        <button class="pokedex-button type">
                            <img src="img/icons-type/fairy.svg" alt="">
                            <span>Fairy</span>
                        </button>
                    </li>
                </ul>
                
            </div>

            <div class="container pokedex-list-menu-container">
            <div class="pokedex-list-menu">
                    <span>Show:</span>
                    <strong>All</strong>
            </div>
            </div>
            <div class="pokedex-pokemon">
                <div class="pokemon-qtd">
                    <img src="img/icon-poke-red.svg" alt="">
                    <h3><span></span> Pokémons</h3>
                </div>

                <div class="pokedex-grid">
                    <button class="pokemon">
                        <div class="pokemon-img">
                            <img src="img/venusaur.svg" alt="">
                        </div>
                        <div class="pokemon-info">
                            <span>#001</span>
                            <p>Venusaur</p>
                            <img src="img/icons-type/grass.svg" alt="">
                        </div>
                    </button>
                    <button class="pokemon">
                        <div class="pokemon-img">
                            <img src="img/venusaur.svg" alt="">
                        </div>
                        <div class="pokemon-info">
                            <span>#001</span>
                            <p>Venusaur</p>
                            <img src="img/icons-type/grass.svg" alt="">
                        </div>
                    </button>
                    <button class="pokemon">
                        <div class="pokemon-img">
                            <img src="img/venusaur.svg" alt="">
                        </div>
                        <div class="pokemon-info">
                            <span>#001</span>
                            <p>Venusaur</p>
                            <img src="img/icons-type/grass.svg" alt="">
                        </div>
                    </button>
                    <button class="pokemon">
                        <div class="pokemon-img">
                            <img src="img/venusaur.svg" alt="">
                        </div>
                        <div class="pokemon-info">
                            <span>#001</span>
                            <p>Venusaur</p>
                            <img src="img/icons-type/grass.svg" alt="">
                        </div>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-background">
        <div class="footer container">
        <section class="footer-info">
            <p>Javascript e API</p>
            <span>Site desenvolvido com Javascript, consumindo e exibindo dados de uma API</span>
        </section>
        <article class="footer-data">
            <p>Renan Stein</p>
            <a href="https://github.com/RenanStein" target="_blank">Github</a>
        </article>
        
    </footer>
    <script type="module" src="script/script.js"></script>
</body>
</html>
